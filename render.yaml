services:
  - type: web
    name: metro-hackathon-api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CAMERA_ROOT
        value: /opt/render/project/src/data/Camera
      - key: OUTPUTS_DIR
        value: /opt/render/project/src/demo-data/outputs
